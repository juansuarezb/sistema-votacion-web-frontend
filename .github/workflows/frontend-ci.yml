name: Frontend CI

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Usa la versión de Node que estés usando localmente
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build frontend
      run: npm run build
      env:
        # Variables de entorno simuladas para que el build no falle si Vite las requiere
        VITE_API_URL: http://localhost:8080
        VITE_KEYCLOAK_URL: http://localhost:8081

    # Descomenta esto si tienes scripts de lint o tests
    # - name: Run Linter
    #   run: npm run lint
    
    # - name: Run Tests
    #   run: npm run test
