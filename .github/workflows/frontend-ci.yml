name: Frontend CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

env:
  REGISTRY: ghcr.io

jobs:
  # ==========================================
  # FASE 1: CI (Integración Continua)
  # Construye el frontend para verificar que compile
  # ==========================================
  ci-build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build frontend
      run: npm run build
      env:
        # Variables simuladas para evitar errores durante el build estático
        VITE_API_URL: http://localhost:8080
        VITE_KEYCLOAK_URL: http://localhost:8081

  # ==========================================
  # FASE 2: CD (Despliegue Continuo)
  # Crea la imagen Docker del frontend y la publica
  # ==========================================
  cd-docker-publish:
    needs: ci-build 
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    
    # Permisos para escribir en GitHub Container Registry
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Downcase Repo Name (GHCR requere minúsculas)
      run: echo "REPO_LOWERCASE=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

    - name: Build & Push Frontend Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: Dockerfile
        push: true
        tags: ${{ env.REGISTRY }}/${{ env.REPO_LOWERCASE }}-frontend:latest
        # Importante: Pasar los ARGs que el Dockerfile del frontend necesita para compilar React
        build-args: |
          VITE_API_URL=http://localhost:8080
          VITE_KEYCLOAK_URL=http://localhost:8081
